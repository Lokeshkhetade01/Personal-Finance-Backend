spring.application.name=personal-finance-manager

# ===== MySQL Configuration (update credentials before running) =====
spring.datasource.url=jdbc:mysql://localhost:3306/manager_finance
spring.datasource.username=root
spring.datasource.password=mypassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Server =====
server.port=8084
server.error.include-message=always

# ===== JWT =====
app.jwt.secret=ThisIsAVeryLongSecretKeyUsedForSigningJwtTokensChangeItInProduction123456
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===== File Upload / Receipt Storage =====
app.file.upload-dir=uploads/receipts
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.org.springframework.security=INFO
logging.level.com.pfm.financemanager=DEBUG
